<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden - Care Guide</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya: #2D5A27; --accent: #5E8D5A; --bg: #F9FBF9; --white: #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: #333; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Card & UI */
        .card { background: var(--white); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .guide-card { display: none; background: var(--white); border-radius: 30px; padding: 0; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.08); animation: slideUp 0.4s ease; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Care Icon Grid */
        .care-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; }
        .care-item { background: #f0f7f0; padding: 15px 10px; border-radius: 20px; text-align: center; }
        .care-item span { display: block; font-size: 10px; color: #888; text-transform: uppercase; }
        .care-item b { font-size: 13px; color: var(--phetpaya); }

        .btn { background: var(--phetpaya); color: white; border: none; padding: 18px; border-radius: 25px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-search { background: var(--accent); margin-top: 10px; }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; padding: 15px 0 35px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .nav-item { flex: 1; text-align: center; color: #BDC3C7; font-size: 12px; }
        .nav-item.active { color: var(--phetpaya); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-page">
        <div class="card" style="background: linear-gradient(135deg, #2D5A27, #5E8D5A); color: white; text-align: left;">
            <div id="loc" style="font-size: 12px; opacity: 0.8;">📍 กำลังค้นหาตำแหน่ง...</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <h1 id="temp" style="margin:0; font-size: 45px;">--°C</h1>
                <button onclick="getGPS()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:8px 15px; border-radius:15px; font-size:12px;">🔄 อัปเดต</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">🔍 ค้นหาคู่มือการดูแล</h3>
            <p style="font-size: 12px; color: #888;">พิมพ์ชื่อต้นไม้เพื่อดูวิธีดูแลรักษา</p>
            <button class="btn btn-search" onclick="searchPlantDB()">📚 ค้นหาต้นไม้ในสวน</button>
            <button class="btn" style="margin-top:10px; background:#f0f0f0; color:#333;" onclick="runAIDiagnosis()">📷 สแกนโรคพืช (AI)</button>
        </div>

        <div id="guide-res" class="guide-card">
            <div id="plant-header" style="background: #2D5A27; color: white; padding: 30px 20px; text-align: center;">
                <h2 id="res-name" style="margin:0;">ชื่อต้นไม้</h2>
                <p id="res-botanical" style="font-size: 12px; opacity: 0.8; margin: 5px 0 0;">Botanical Name</p>
            </div>
            <div class="care-grid">
                <div class="care-item"><span>Care</span><b id="res-care">Easy</b></div>
                <div class="care-item"><span>Water</span><b id="res-water">Every 7 days</b></div>
                <div class="care-item"><span>Sun</span><b id="res-sun">Part Sun</b></div>
            </div>
            <div style="padding: 0 25px 25px; text-align: left;">
                <p style="font-size: 12px; color: #888; margin-bottom: 5px;">NOTE / TREATMENT</p>
                <div id="res-note" style="font-size: 14px; line-height: 1.6; color: #444;"></div>
            </div>
        </div>
        
        <div id="ai-status" style="text-align:center; font-size:13px; color:var(--accent); margin-top:15px;"></div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active">🏡<br>Dashboard</div>
    <div class="nav-item" onclick="alert('ฟีเจอร์นี้จะมาเร็วๆ นี้!')">🌿<br>My Garden</div>
</div>

<script>
    // ใช้ URL ใหม่ที่คุณเพิ่ง Deploy มา
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdbNHpErNo49-qPOBb7Q8fM2b3tiPbcDSNH_6QcysM3-rEKCeG_-4KWBjqOTLqzW2xCQ/exec";

    async function init() {
        try { await liff.init({ liffId: "2009595288-7Tm3Mher" }); } catch(e) {}
        getGPS();
    }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=f1311f97b48347f3b60c0f8364843477&units=metric&lang=th`);
            const data = await res.json();
            document.getElementById('loc').innerText = "📍 " + data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
        });
    }

    async function searchPlantDB() {
        const name = prompt("พิมพ์ชื่อต้นไม้ (เช่น มอนสเตอร่า, ลิ้นมังกร):");
        if(!name) return;
        
        const status = document.getElementById('ai-status');
        const guide = document.getElementById('guide-res');
        status.innerText = "⏳ กำลังค้นหาในฐานข้อมูลส่วนตัว...";
        guide.style.display = "none";

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'searchDB', plantName: name }) });
            const data = await res.json();
            
            if(data.status === "success") {
                document.getElementById('res-name').innerText = data.name;
                document.getElementById('res-botanical').innerText = data.botanical || "Home Plant";
                document.getElementById('res-water').innerText = data.water;
                document.getElementById('res-sun').innerText = data.sun;
                document.getElementById('res-care').innerText = data.care;
                document.getElementById('res-note').innerText = data.note;
                
                status.innerText = "✅ พบข้อมูลแล้ว";
                guide.style.display = "block";
            } else {
                status.innerText = "❌ ไม่พบข้อมูลพืชชื่อนี้ใน Sheet ของคุณ";
            }
        } catch(e) { status.innerText = "⚠️ ไม่สามารถเชื่อมต่อฐานข้อมูลได้"; }
    }

    // ฟังก์ชัน AI สแกนโรค (แบบประหยัด คืนค่า Text)
    function runAIDiagnosis() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('ai-status');
            status.innerText = "⏳ AI Gemini กำลังวิเคราะห์โรค...";
            
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 500; canvas.height = (img.height/img.width)*500;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);

                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'ai', image: base64 }) });
                    const aiText = await res.text();
                    
                    document.getElementById('guide-res').style.display = "none";
                    status.innerHTML = `<div style="text-align:left; background:white; padding:20px; border-radius:20px; margin-top:10px; border:1px solid #ddd;"><b>🏥 ผลการวินิจฉัย:</b><br>${aiText.replace(/\n/g, '<br>')}</div>`;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    init();
</script>
</body>
</html>
