<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden - Premium</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --phetpaya: #2D5A27; 
            --accent: #5E8D5A;
            --danger: #FF6B6B; 
            --google: #4285F4; 
            --bg: #F0F4F0; 
            --card-bg: #FFFFFF;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            color: #2C3E50;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header ดีไซน์ใหม่ */
        .app-header { 
            background: #fff; 
            padding: 20px; 
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Weather Hero แบบ Plantin */
        .weather-hero { 
            background: linear-gradient(135deg, #2D5A27, #5E8D5A); 
            color: white; 
            border-radius: 28px; 
            padding: 25px; 
            margin-bottom: 25px; 
            position: relative;
            box-shadow: 0 10px 20px rgba(45,90,39,0.2);
        }

        .loc-tag { 
            font-size: 12px; 
            background: rgba(255,255,255,0.25); 
            padding: 6px 14px; 
            border-radius: 50px; 
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        /* Plant Card ดีไซน์ใหม่ */
        .plant-card { 
            background: var(--card-bg); 
            border-radius: 30px; 
            padding: 15px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }

        .plant-img-container {
            width: 100%;
            height: 220px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .plant-img { width: 100%; height: 100%; object-fit: cover; }

        /* Progress Bar สำหรับรดน้ำ */
        .water-progress {
            background: #eee;
            height: 8px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .water-fill {
            background: #4A90E2;
            height: 100%;
            transition: width 0.5s ease-out;
        }

        /* Buttons */
        .btn-main { 
            background: var(--phetpaya); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 22px; 
            width: 100%; 
            font-weight: 600; 
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(45,90,39,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-action-round {
            background: #F8FAF8;
            border: 1.5px solid #E0EADD;
            padding: 12px;
            border-radius: 18px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            flex: 1;
        }

        /* Bottom Nav */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px);
            display: flex; padding: 15px 0 30px 0; 
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .nav-item { flex: 1; text-align: center; color: #BDC3C7; font-size: 12px; }
        .nav-item.active { color: var(--phetpaya); }

        /* Modal */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { 
            background:white; padding:30px; border-radius:35px; width:100%; max-width: 400px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .page-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

<div class="app-header">
    <div>
        <div style="font-size: 14px; color: #999;">ยินดีต้อนรับ</div>
        <div id="user-display" style="font-weight:600; font-size: 20px; color: var(--phetpaya);">ผู้ดูแลสวน</div>
    </div>
    <div style="width: 45px; height: 45px; background: #E0EADD; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;">🌿</div>
</div>

<div class="container">
    <div id="page-home" class="page-content active">
        <div class="weather-hero">
            <span class="loc-tag" id="loc-text">📍 กำลังเรียกตำแหน่ง...</span>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div>
                    <div id="temp-display" style="font-size: 48px; font-weight: 600;">--°C</div>
                    <div id="weather-desc" style="font-size: 16px; opacity: 0.9;">รอข้อมูลอากาศ</div>
                </div>
                <div id="weather-icon" style="font-size: 60px;">🌤️</div>
            </div>
            <div id="disease-alert" style="margin-top: 20px; background: rgba(255,255,255,0.15); padding: 12px; border-radius: 15px; font-size: 13px;">
                🍃 ระบบพร้อมบันทึกพืชใหม่บน Cloud
            </div>
        </div>

        <button class="btn-main" onclick="openModal('add-modal')">
            <span>+</span> ลงทะเบียนพืชใหม่
        </button>

        <h3 style="margin: 25px 0 15px 5px; font-weight: 600;">ต้นไม้ของฉัน</h3>
        <div id="plantList"></div>
    </div>

    <div id="page-tools" class="page-content">
        <h3 style="margin-bottom: 20px;">เครื่องมืออัจฉริยะ</h3>
        <div class="plant-card" style="text-align: center; padding: 30px;">
            <div style="font-size: 50px; margin-bottom: 10px;">💡</div>
            <div style="font-weight: 600; font-size: 18px;">Lux Meter</div>
            <p style="color: #777; font-size: 14px;">วัดแสงให้ต้นไม้ของคุณ</p>
            <div id="lux-val" style="font-size: 36px; font-weight: 700; color: var(--google); margin: 15px 0;">0 LUX</div>
            <button class="btn-main" onclick="startLuxMeter()">เริ่มวัดแสง</button>
            <video id="lux-preview" autoplay playsinline style="display:none;"></video>
            <canvas id="c-buffer" style="display:none;"></canvas>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">
        <div style="font-size: 20px;">🏡</div><div>หน้าหลัก</div>
    </div>
    <div class="nav-item" onclick="switchTab('tools', this)">
        <div style="font-size: 20px;">🔍</div><div>เครื่องมือ</div>
    </div>
    <div class="nav-item" onclick="switchTab('report', this)">
        <div style="font-size: 20px;">📑</div><div>ประวัติ</div>
    </div>
</div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color: var(--phetpaya);">🌿 เพิ่มสมาชิกใหม่</h2>
        <label style="font-size: 13px; color: #666;">ชื่อต้นไม้</label>
        <input type="text" id="p-name" class="input-box" placeholder="เช่น มอนสเตอร่า">
        
        <label style="font-size: 13px; color: #666; margin-top: 15px; display: block;">ถ่ายภาพต้นไม้</label>
        <input type="file" id="p-img" class="input-box" accept="image/*" capture="environment" onchange="mobileImageHandler(this)">
        
        <div id="upload-status" style="display:none; margin-top: 10px; font-size: 12px; color: var(--accent);">⏳ กำลังเตรียมรูปภาพ...</div>
        
        <button id="save-btn" class="btn-main" style="margin-top: 25px;" onclick="savePlantV22()" disabled>บันทึกเข้าคลาวด์</button>
        <button style="width:100%; border:none; background:none; margin-top:15px; color:#999;" onclick="closeModal('add-modal')">ไว้วันหลัง</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHtDLDUA67ZQqN623jp9R8wAs0uqXMAd3-QTjije5sBTQbexhII1bN9wIi9rIk5ZSG6Q/exec";
    let plants = JSON.parse(localStorage.getItem('phetpaya_v22_db') || "[]");
    let curTemp = 30, curLoc = "ระบุตำแหน่งไม่ได้", processedImageData = "";

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-display').innerText = profile.displayName;
            } else { liff.login(); }
        } catch (e) {}
        updateWeather();
        renderUI();
    }

    // ระบบอากาศพร้อมตัวจัดการ error
    function updateWeather() {
        if (!navigator.geolocation) {
            document.getElementById('loc-text').innerText = "📍 ระบบตำแหน่งไม่รองรับ";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=f1311f97b48347f3b60c0f8364843477&units=metric&lang=th`);
                const data = await res.json();
                curTemp = data.main.temp;
                curLoc = data.name;
                document.getElementById('loc-text').innerText = "📍 " + curLoc;
                document.getElementById('temp-display').innerText = Math.round(curTemp) + "°C";
                document.getElementById('weather-desc').innerText = data.weather[0].description;
                document.getElementById('disease-alert').innerText = "🌡️ อากาศวันนี้: " + data.weather[0].description;
            } catch (e) {
                document.getElementById('loc-text').innerText = "📍 โหลดอากาศล้มเหลว";
            }
        }, (err) => {
            document.getElementById('loc-text').innerText = "📍 กรุณาอนุญาตเข้าถึงตำแหน่ง";
        });
    }

    function mobileImageHandler(input) {
        const file = input.files[0];
        if (!file) return;
        document.getElementById('upload-status').style.display = 'block';
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 500; canvas.height = (img.height / img.width) * 500;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                processedImageData = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('upload-status').innerText = "✅ รูปภาพพร้อมแล้ว";
                document.getElementById('save-btn').disabled = false;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function savePlantV22() {
        const name = document.getElementById('p-name').value;
        const btn = document.getElementById('save-btn');
        btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, image: processedImageData, weather: curLoc }) });
            
            plants.push({ id: Date.now(), name, img: processedImageData, lastW: Date.now(), lastF: Date.now() });
            localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
            
            closeModal('add-modal');
            renderUI();
            alert("ยินดีด้วย! " + name + " เข้าสู่สวนของคุณแล้ว");
        } catch (e) { alert("Error: " + e.message); }
        btn.innerText = "บันทึกเข้าคลาวด์"; btn.disabled = false;
    }

    function renderUI() {
        const list = document.getElementById('plantList');
        list.innerHTML = plants.map(p => {
            const daysSinceW = Math.floor((Date.now() - p.lastW) / (1000 * 60 * 60 * 24));
            const progress = Math.max(0, 100 - (daysSinceW * 30)); // สมมติ 3 วันน้ำแห้ง
            
            return `
                <div class="plant-card">
                    <div class="plant-img-container">
                        <img src="${p.img}" class="plant-img">
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:600; font-size:18px;">${p.name}</div>
                        <div style="font-size:12px; color:#999;">รดน้ำล่าสุด ${daysSinceW} วันที่แล้ว</div>
                    </div>
                    <div class="water-progress"><div class="water-fill" style="width: ${progress}%"></div></div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-action-round" onclick="carePlant(${p.id}, 'water')">💧 รดน้ำ</button>
                        <button class="btn-action-round" onclick="carePlant(${p.id}, 'fert')">🧪 ใส่ปุ๋ย</button>
                        <button class="btn-action-round" style="background:#FFEBEB; color:red; border:none;" onclick="deletePlant(${p.id})">🗑️</button>
                    </div>
                </div>
            `;
        }).join('') || `<div style="text-align:center; padding: 40px; color:#BDC3C7;">ยังไม่มีต้นไม้<br>มาเริ่มปลูกต้นแรกกันเถอะ!</div>`;
    }

    function carePlant(id, type) {
        plants = plants.map(p => {
            if(p.id === id) {
                if(type === 'water') p.lastW = Date.now();
                else p.lastF = Date.now();
            }
            return p;
        });
        localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
        renderUI();
    }

    function deletePlant(id) {
        if(confirm('ลบต้นไม้ต้นนี้ใช่ไหม?')) {
            plants = plants.filter(p => p.id !== id);
            localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
            renderUI();
        }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    init();
</script>
</body>
</html>
