<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phetpaya Garden - Smart Care</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya-green: #1B5E20; --light-bg: #F5F7F5; --status-danger: #E53935; --line-shopping: #00b900; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--light-bg); margin: 0; padding-bottom: 100px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; border: 1px solid #eee; margin-bottom: 15px; }
        
        /* Product Card */
        .product-list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .product-item { background: #f9f9f9; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #efefef; }
        .product-img { width: 60px; height: 60px; border-radius: 8px; background: #ddd; object-fit: cover; }
        .btn-buy { background: var(--line-shopping); color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        
        /* Form Control */
        .select-std { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; margin-bottom: 15px; appearance: none; background: #fff url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns="http://www.w3.org/2000/svg"%20width="24"%20height="24"%20viewBox="0 0 24 24"><path%20fill="%23ccc"%20d="M7%2010l5%205%205-5z"/></svg>') no-repeat right 10px center; }
        .btn-main { background: var(--phetpaya-green); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 12px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #999; }
        .nav-item.active { color: var(--phetpaya-green); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--phetpaya-green); text-align:center;">🔍 บันทึกและแก้ปัญหาพืช</h2>
    
    <div class="card">
        <label style="font-weight:600; display:block; margin-bottom:8px;">ระบุอาการที่พบในวันนี้:</label>
        <select id="issue-select" class="select-std" onchange="showRecommendation()">
            <option value="">-- โปรดเลือกอาการ --</option>
            <option value="pest">พบเพลี้ยระบาด (เพลี้ยไฟ/ไรแดง)</option>
            <option value="fungi">พบเชื้อรา (รากเน่า/ใบจุด)</option>
            <option value="yellow">ใบเหลือง/พืชไม่โต (ขาดสารอาหาร)</option>
            <option value="worm">พบหนอนเจาะลำต้น/ใบ</option>
        </select>
        
        <div id="recommendation-area" style="display:none;">
            <div id="advice-text" style="background:#FFF3E0; padding:12px; border-radius:10px; border-left:4px solid #FF9800; font-size:13px; margin-bottom:15px;">
                </div>

            <div class="product-list">
                <div style="font-weight:600; font-size:14px; margin-bottom:10px; color:var(--phetpaya-green);">📦 สินค้าแนะนำเพื่อการรักษา:</div>
                <div id="product-items-container">
                    </div>
            </div>
        </div>

        <button class="btn-main" style="margin-top:10px;" onclick="saveAndClose()">บันทึกประวัติการดูแล</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active">🌳 รายการพืช</div>
    <div class="nav-item">🌦️ พยากรณ์โรค</div>
    <div class="nav-item">📑 รายงาน</div>
</div>

<script>
    // ข้อมูลสินค้าที่สัมพันธ์กับอาการ (คุณสามารถเปลี่ยนลิงก์เป็น LINE SHOP ของคุณได้เลย)
    const shopData = {
        pest: {
            advice: "⚠️ เพลี้ยไฟมักระบาดในช่วงอากาศแห้ง แนะนำให้ฉีดพ่นช่วงเช้ามืดและสำรวจหลังใบเป็นประจำ",
            products: [
                { name: "Phetpaya PestKill (กำจัดเพลี้ย)", price: "290.-", link: "https://shop.line.me/@YOUR_ID/product/1", img: "🐞" },
                { name: "Trikoreac Bio-Guard", price: "350.-", link: "https://shop.line.me/@YOUR_ID/product/2", img: "🛡️" }
            ]
        },
        fungi: {
            advice: "⚠️ พบเชื้อราควรลดความชื้นที่โคนต้น และใช้สารกำจัดเชื้อราที่มีประสิทธิภาพป้องกันการลุกลาม",
            products: [
                { name: "สูตรแก้รากเน่าเพชรพญา", price: "450.-", link: "https://shop.line.me/@YOUR_ID/product/3", img: "🍄" },
                { name: "ไตรโคเดอร์มาชนิดเข้มข้น", price: "190.-", link: "https://shop.line.me/@YOUR_ID/product/4", img: "🧪" }
            ]
        },
        yellow: {
            advice: "⚠️ พืชอาจขาดไนโตรเจนหรือธาตุอาหารรอง แนะนำให้เสริมสารบำรุงทางใบเพื่อให้พืชฟื้นตัวเร็ว",
            products: [
                { name: "อาหารเสริมพืชเพชรพญา", price: "320.-", link: "https://shop.line.me/@YOUR_ID/product/5", img: "🌿" }
            ]
        },
        worm: {
            advice: "⚠️ หนอนเจาะทำลายท่อน้ำเลี้ยง แนะนำให้ทำลายส่วนที่โดนเจาะและใช้สารป้องกันแมลงทันที",
            products: [
                { name: "ชุดกำจัดหนอนเพชรพญา", price: "380.-", link: "https://shop.line.me/@YOUR_ID/product/6", img: "🐛" }
            ]
        }
    };

    function showRecommendation() {
        const issue = document.getElementById('issue-select').value;
        const area = document.getElementById('recommendation-area');
        const advice = document.getElementById('advice-text');
        const container = document.getElementById('product-items-container');

        if (!issue) {
            area.style.display = 'none';
            return;
        }

        const data = shopData[issue];
        advice.innerText = data.advice;
        
        container.innerHTML = data.products.map(p => `
            <div class="product-item">
                <div style="font-size:30px;">${p.img}</div>
                <div style="flex:1;">
                    <div style="font-weight:600; font-size:13px;">${p.name}</div>
                    <div style="color:var(--status-danger); font-size:12px; font-weight:600;">${p.price}</div>
                </div>
                <a href="${p.link}" target="_blank" class="btn-buy">🛒 ซื้อเลย</a>
            </div>
        `).join('');

        area.style.display = 'block';
    }

    function saveAndClose() {
        const issue = document.getElementById('issue-select').value;
        if(!issue) return alert("กรุณาเลือกอาการที่พบก่อนบันทึกครับ");
        alert("บันทึกประวัติเรียบร้อย! อย่าลืมดูแลพืชตามคำแนะนำนะครับ");
    }

    async function init() {
        try { await liff.init({ liffId: "2009595288-7Tm3Mher" }); } catch (e) {}
    }
    init();
</script>
</body>
</html>
