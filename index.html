<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden Pro</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya: #2D5A27; --google: #4285F4; --bg: #F0F4F0; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 120px; color: #2C3E50; }
        .app-header { background: #fff; padding: 20px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Weather Card */
        .weather-hero { background: linear-gradient(135deg, #2D5A27, #5E8D5A); color: white; border-radius: 28px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(45,90,39,0.2); }
        .btn-gps { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; margin-top: 10px; }

        .plant-card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 20px; text-align: center; }
        .btn-main { background: var(--phetpaya); color: white; border: none; padding: 18px; border-radius: 22px; width: 100%; font-weight: 600; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(45,90,39,0.3); }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; padding: 15px 0 35px 0; border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-item { flex: 1; text-align: center; color: #BDC3C7; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--phetpaya); font-weight: 600; }
        
        .ai-result { background: #f0f7f0; padding: 15px; border-radius: 15px; border-left: 5px solid var(--phetpaya); text-align: left; margin-top: 15px; font-size: 14px; display: none; }
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:600; color:var(--phetpaya);">Phetpaya Garden</div>
    <div id="user-display" style="font-size:12px;">สวัสดีผู้ดูแลสวน</div>
</div>

<div class="container">
    <div id="page-home" class="page-content active">
        <div class="weather-hero">
            <div id="loc-text">📍 รอยืนยันตำแหน่ง...</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div>
                    <div id="temp-display" style="font-size: 40px; font-weight: 600;">--°C</div>
                    <div id="weather-desc">กรุณากดปุ่มเปิด GPS</div>
                </div>
                <div style="font-size: 50px;">🌤️</div>
            </div>
            <button class="btn-gps" onclick="updateWeather()">🔄 เปิด GPS / อัปเดตอากาศ</button>
        </div>
        <button class="btn-main" onclick="switchTab('tools', document.querySelectorAll('.nav-item')[1])">🔍 ไปที่เครื่องมือวิเคราะห์</button>
    </div>

    <div id="page-tools" class="page-content">
        <div class="plant-card">
            <div style="font-size: 40px;">🏥</div>
            <h3 style="margin: 10px 0;">AI วินิจฉัยโรคพืช</h3>
            <p style="font-size: 12px; color: #777;">ถ่ายรูปใบไม้เพื่อส่งให้ Gemini วิเคราะห์</p>
            <div id="ai-status" style="font-size: 13px; color: var(--phetpaya); margin: 10px 0;"></div>
            <div id="ai-output" class="ai-result"></div>
            <button class="btn-main" id="btn-ai" onclick="startAIDiagnosis()">📷 ถ่ายรูปสแกนโรค</button>
        </div>

        <div class="plant-card">
            <div style="font-size: 40px;">💡</div>
            <h3 style="margin: 10px 0;">Lux Meter</h3>
            <div id="lux-val" style="font-size: 48px; font-weight: 700; color: var(--google); margin: 10px 0;">0</div>
            <div id="lux-advice" style="font-size: 14px; color: var(--accent); margin-bottom: 15px; font-weight: 600;">- รอกดวัดแสง -</div>
            <button class="btn-main" style="background:#f0f0f0; color:#333;" onclick="startLuxMeter()">เริ่มวัดแสง</button>
            <video id="lux-preview" autoplay playsinline style="display:none;"></video>
            <canvas id="c-buffer" style="display:none;"></canvas>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">🏡<br>หน้าหลัก</div>
    <div class="nav-item" onclick="switchTab('tools', this)">🔍<br>เครื่องมือ</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHtDLDUA67ZQqN623jp9R8wAs0uqXMAd3-QTjije5sBTQbexhII1bN9wIi9rIk5ZSG6Q/exec";
    let curLoc = "ระบุตำแหน่งไม่ได้";

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-display').innerText = "คุณ " + profile.displayName;
            } else { liff.login(); }
        } catch (e) {}
    }

    // แก้ปัญหาภาพที่ 2: เพิ่มปุ่มกดเรียกสิทธิ์ GPS
    function updateWeather() {
        document.getElementById('loc-text').innerText = "⏳ กำลังค้นหา...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=f1311f97b48347f3b60c0f8364843477&units=metric&lang=th`);
                const data = await res.json();
                curLoc = data.name;
                document.getElementById('loc-text').innerText = "📍 " + curLoc;
                document.getElementById('temp-display').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('weather-desc').innerText = data.weather[0].description;
            } catch(e) { document.getElementById('weather-desc').innerText = "โหลดอากาศล้มเหลว"; }
        }, (err) => {
            alert("กรุณาอนุญาตสิทธิ์การเข้าถึงตำแหน่ง (GPS) ในการตั้งค่าเบราว์เซอร์");
            document.getElementById('loc-text').innerText = "📍 โปรดเปิด GPS";
        });
    }

    // แก้ปัญหาภาพแรก: แสดงผล AI ลงหน้าจอทันที
    async function startAIDiagnosis() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
        
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const status = document.getElementById('ai-status');
            const output = document.getElementById('ai-output');
            const btn = document.getElementById('btn-ai');

            status.innerHTML = "⏳ <b>กำลังส่งภาพให้ Gemini วิเคราะห์...</b><br>โปรดรอประมาณ 10 วินาที";
            output.style.display = "none";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 500; canvas.height = (img.height / img.width) * 500;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);

                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'diagnose', image: base64, weather: curLoc })
                        });
                        const res = await response.json();
                        
                        status.innerHTML = "✅ วิเคราะห์เสร็จสิ้น";
                        output.innerHTML = "<b>🌿 ผลการวิเคราะห์ AI:</b><br>" + res.analysis.replace(/\n/g, "<br>");
                        output.style.display = "block";
                    } catch (err) {
                        status.innerHTML = "⚠️ บันทึกข้อมูลเข้า Sheet แล้ว (อ่านผลจากหน้าจอไม่ได้เนื่องจาก CORS)";
                        alert("วิเคราะห์เสร็จแล้ว! กรุณาตรวจสอบผลใน Google Sheet ของคุณครับ");
                    } finally { btn.disabled = false; }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    // เพิ่มระบบวิเคราะห์แสง (Lux Logic)
    async function startLuxMeter() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            const video = document.getElementById('lux-preview');
            const advice = document.getElementById('lux-advice');
            video.srcObject = stream;
            
            setTimeout(() => {
                const canvas = document.getElementById('c-buffer');
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const pix = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
                let b = 0; for(let i=0; i<pix.length; i+=4) b += (pix[i]+pix[i+1]+pix[i+2])/3;
                const lux = Math.round((b/(pix.length/4))*15);
                
                document.getElementById('lux-val').innerText = lux;
                
                // --- ระบบวิเคราะห์แสง ---
                if(lux < 500) advice.innerText = "🌚 แสงน้อย: เหมาะกับพืชในร่ม/เฟิร์น";
                else if(lux < 2000) advice.innerText = "⛅ แสงรำไร: เหมาะกับไม้ใบ/พลูด่าง";
                else advice.innerText = "☀️ แสงจัด: เหมาะกับพืชแดด/พืชสวน";
                
                stream.getTracks().forEach(t => t.stop());
            }, 1500);
        } catch(e) { alert("กรุณาเปิดกล้อง"); }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    init();
</script>
</body>
</html>
