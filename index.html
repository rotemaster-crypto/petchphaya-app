<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden - Smart Dashboard</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya: #2D5A27; --accent: #5E8D5A; --bg: #F9FBF9; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 110px; color: #2C3E50; }
        
        /* Header & Profile */
        .app-header { background: #fff; padding: 25px 20px; border-radius: 0 0 35px 35px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: #E8F0E7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Weather Card - Plantin Style */
        .weather-card { 
            background: linear-gradient(135deg, #2D5A27, #4A7A44); color: white; border-radius: 30px; padding: 25px; margin-bottom: 25px; 
            box-shadow: 0 12px 25px rgba(45,90,39,0.25); position: relative; overflow: hidden;
        }
        .weather-card::after { content: '🌿'; position: absolute; right: -10px; bottom: -10px; font-size: 80px; opacity: 0.1; }

        /* Plant Grid */
        .plant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .plant-item { 
            background: white; border-radius: 25px; padding: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.03); 
            text-align: center; position: relative; border: 1px solid #f0f0f0;
        }
        .plant-item img { width: 100%; height: 130px; border-radius: 20px; object-fit: cover; margin-bottom: 10px; }
        .status-dot { position: absolute; top: 18px; right: 18px; width: 10px; height: 10px; background: #4CAF50; border-radius: 50%; border: 2px solid white; }

        /* Action Buttons */
        .btn-add { 
            background: var(--phetpaya); color: white; border: none; padding: 18px; border-radius: 22px; 
            width: 100%; font-weight: 600; font-size: 16px; box-shadow: 0 8px 20px rgba(45,90,39,0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .btn-add:active { transform: scale(0.98); }

        /* Navigation Bar */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(15px); display: flex; padding: 15px 0 35px 0; 
            border-radius: 35px 35px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.05);
        }
        .nav-item { flex: 1; text-align: center; color: #BDC3C7; font-size: 11px; }
        .nav-item.active { color: var(--phetpaya); font-weight: 600; }

        /* Modal Customization */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:white; padding:30px; border-radius:35px; width:100%; max-width: 400px; animation: popUp 0.3s ease-out; }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #EEE; margin-top: 10px; background: #F9F9F9; font-family: 'Kanit'; box-sizing: border-box; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="user-info">
        <div class="avatar">👨‍🌾</div>
        <div>
            <div style="font-size: 12px; color: #999;">สวัสดีคุณ</div>
            <div id="user-display" style="font-weight:600; font-size: 18px; color: var(--phetpaya);">ผู้ดูแลสวน</div>
        </div>
    </div>
    <button onclick="clearCache()" style="background:none; border:none; font-size:20px;">⚙️</button>
</div>

<div class="container">
    <div id="page-home" class="page-content active">
        <div class="weather-card">
            <div id="loc-text" style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; display: inline-block;">📍 กำลังค้นหาตำแหน่ง...</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div>
                    <div id="temp-display" style="font-size: 42px; font-weight: 600;">--°C</div>
                    <div id="weather-desc" style="font-size: 14px; opacity: 0.9;">รอการอนุญาต GPS</div>
                </div>
                <div id="weather-icon" style="font-size: 50px;">🌤️</div>
            </div>
        </div>

        <button class="btn-add" onclick="openModal('add-modal')">
            <span>+</span> เพิ่มต้นไม้ใหม่เข้าสวน
        </button>

        <div style="margin: 25px 0 15px 5px; font-weight: 600; display: flex; justify-content: space-between;">
            <span>รายการต้นไม้</span>
            <span id="plant-count" style="color: var(--phetpaya); font-size: 14px;">0 ต้น</span>
        </div>
        
        <div id="plantList" class="plant-grid"></div>
    </div>

    <div id="page-tools" class="page-content">
        <h3 style="margin-bottom: 20px;">เครื่องมืออัจฉริยะ</h3>
        <div class="plant-item" style="padding: 40px;">
            <div style="font-size: 50px; margin-bottom: 10px;">💡</div>
            <div style="font-weight: 600; font-size: 18px;">Lux Meter</div>
            <div id="lux-val" style="font-size: 48px; font-weight: 700; color: var(--phetpaya); margin: 20px 0;">0</div>
            <button class="btn-add" onclick="startLuxMeter()">วัดความเข้มแสง</button>
            <video id="lux-preview" autoplay playsinline style="display:none;"></video>
            <canvas id="c-buffer" style="display:none;"></canvas>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">
        <div style="font-size: 20px;">🏡</div><div>สวนของฉัน</div>
    </div>
    <div class="nav-item" onclick="switchTab('tools', this)">
        <div style="font-size: 20px;">🔍</div><div>เครื่องมือ</div>
    </div>
</div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 15px 0;">🌿 บันทึกพืชใหม่</h3>
        <input type="text" id="p-name" class="input-box" placeholder="ชื่อต้นไม้ เช่น มอนสเตอร่า">
        <input type="file" id="p-img" class="input-box" accept="image/*" capture="environment" onchange="compressImage(this)">
        <div id="upload-status" style="font-size:12px; color:var(--phetpaya); margin-top:8px; display:none;">⌛ กำลังเตรียมรูปภาพ...</div>
        
        <button id="save-btn" class="btn-add" style="margin-top:25px;" onclick="saveToCloud()" disabled>กรุณาถ่ายรูปภาพ</button>
        <button onclick="closeModal('add-modal')" style="width:100%; border:none; background:none; margin-top:15px; color:#AAA;">ยกเลิก</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHtDLDUA67ZQqN623jp9R8wAs0uqXMAd3-QTjije5sBTQbexhII1bN9wIi9rIk5ZSG6Q/exec";
    let plants = JSON.parse(localStorage.getItem('phetpaya_v22_db') || "[]");
    let processedImg = "";

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-display').innerText = profile.displayName;
            } else { liff.login(); }
        } catch (e) {}
        updateWeather();
        renderUI();
    }

    function clearCache() {
        if(confirm("ต้องการล้างข้อมูลแอปเพื่อแก้ไขอาการค้างไหม?")) {
            localStorage.removeItem('phetpaya_v22_db');
            location.reload();
        }
    }

    function updateWeather() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=f1311f97b48347f3b60c0f8364843477&units=metric&lang=th`);
                const data = await res.json();
                document.getElementById('temp-display').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('loc-text').innerText = "📍 " + data.name;
                document.getElementById('weather-desc').innerText = data.weather[0].description;
            } catch (e) {}
        }, (err) => {
            document.getElementById('loc-text').innerText = "📍 โปรดอนุญาตตำแหน่งในมือถือ";
        });
    }

    function compressImage(input) {
        const file = input.files[0];
        if (!file) return;
        document.getElementById('upload-status').style.display = 'block';
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                // ย่อเหลือ 400px เพื่อประหยัด Quota และป้องกันค้าง
                canvas.width = 400; canvas.height = (img.height / img.width) * 400;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                processedImg = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('upload-status').innerText = "✅ รูปภาพพร้อมบันทึก";
                document.getElementById('save-btn').disabled = false;
                document.getElementById('save-btn').innerText = "บันทึกลง Cloud";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function saveToCloud() {
        const name = document.getElementById('p-name').value;
        if(!name) return alert("กรุณาระบุชื่อต้นไม้");
        
        const btn = document.getElementById('save-btn');
        btn.innerText = "⏳ กำลังส่งข้อมูล...";
        btn.disabled = true;

        try {
            // ส่งข้อมูลไป Apps Script
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, image: processedImg, weather: "Sync from App" }) });
            
            // เก็บข้อมูลเบาๆ ลงเครื่อง (จำกัดแค่ 10 ต้นล่าสุดเพื่อไม่ให้หน่วยความจำเต็ม)
            const newPlant = { id: Date.now(), name, img: processedImg };
            plants.unshift(newPlant);
            if(plants.length > 10) plants.pop(); 
            
            localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
            
            closeModal('add-modal');
            renderUI();
            alert("บันทึกลง Google Sheet สำเร็จ!");
        } catch (e) {
            alert("ข้อผิดพลาด: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "บันทึกลง Cloud";
        }
    }

    function renderUI() {
        const list = document.getElementById('plantList');
        document.getElementById('plant-count').innerText = plants.length + " ต้น";
        list.innerHTML = plants.map(p => `
            <div class="plant-item">
                <div class="status-dot"></div>
                <img src="${p.img}">
                <div style="font-weight:600; font-size:14px; color:var(--phetpaya);">${p.name}</div>
                <div style="font-size:10px; color:#AAA; margin-top:4px;">สถานะ: แข็งแรง</div>
                <button onclick="deletePlant(${p.id})" style="position:absolute; bottom:5px; right:5px; background:none; border:none; color:#EEE; font-size:12px;">🗑️</button>
            </div>
        `).join('') || `<div style="grid-column: 1/3; text-align:center; padding: 40px; color:#BDC3C7;">ยังไม่มีต้นไม้ในสวน...</div>`;
    }

    function deletePlant(id) {
        if(confirm('ลบรายการนี้ใช่ไหม?')) {
            plants = plants.filter(p => p.id !== id);
            localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
            renderUI();
        }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }
    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    async function startLuxMeter() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            const video = document.getElementById('lux-preview');
            video.srcObject = stream;
            setTimeout(() => {
                const canvas = document.getElementById('c-buffer');
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const pix = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
                let b = 0; for(let i=0; i<pix.length; i+=4) b += (pix[i]+pix[i+1]+pix[i+2])/3;
                document.getElementById('lux-val').innerText = Math.round((b/(pix.length/4))*15);
                stream.getTracks().forEach(t => t.stop());
            }, 1000);
        } catch(e) { alert("กรุณาอนุญาตให้เข้าถึงกล้อง"); }
    }

    init();
</script>
</body>
</html>
