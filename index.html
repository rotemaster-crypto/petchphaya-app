<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phetpaya Garden - Professional Journal</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya-green: #1B5E20; --light-bg: #F5F7F5; --status-danger: #E53935; --line-chat: #06C755; --line-shop: #00b900; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--light-bg); margin: 0; padding-bottom: 100px; color: #333; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .app-header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 50; }
        
        /* Plant Card */
        .plant-card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .log-btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .log-btn { padding: 10px 5px; border-radius: 10px; border: 1px solid #eee; background: #f9f9f9; font-size: 11px; cursor: pointer; text-align: center; }
        .log-btn:active { background: #e0e0e0; }

        /* History & Advice */
        .history-tag { display: inline-block; font-size: 10px; background: #FEEBEE; color: var(--status-danger); padding: 2px 8px; border-radius: 10px; margin-top: 5px; }
        .advice-panel { background: #E8F5E9; border-radius: 12px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--phetpaya-green); display: none; }
        
        /* Product & Chat */
        .shop-area { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .action-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; margin-top: 8px; cursor: pointer; display: block; text-decoration: none; text-align: center; font-size: 14px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 12px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #999; }
        .nav-item.active { color: var(--phetpaya-green); font-weight: 600; }
        
        /* Modal */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:18px; width:85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="app-header">
    <h1 style="margin:0; font-size:18px; color:var(--phetpaya-green)">Phetpaya Garden Journal</h1>
    <div id="welcome" style="font-size:12px; color:#777">สวัสดีครับ...</div>
</div>

<div class="container">
    <button class="action-btn" style="background: var(--phetpaya-green); color: white; margin-bottom: 20px;" onclick="document.getElementById('add-modal').style.display='flex'">+ เพิ่มพืชใหม่ในสวน</button>
    <div id="plantList"></div>
</div>

<div id="issue-modal" class="modal">
    <div class="modal-content">
        <h3 id="target-plant-name" style="margin-top:0; color:var(--phetpaya-green);">ต้นไม้ของคุณ</h3>
        <label style="font-size:13px; font-weight:600;">เลือกปัญหาที่พบ:</label>
        <select id="issue-select" style="width:100%; padding:12px; margin-top:8px; border-radius:10px;" onchange="getExpertAdvice()">
            <option value="">-- เลือกอาการ --</option>
            <option value="pest">พบเพลี้ยไฟ / ไรแดง</option>
            <option value="fungi">พบเชื้อรา / รากเน่า</option>
            <option value="yellow">ใบเหลือง / ขาดสารอาหาร</option>
        </select>

        <div id="advice-panel" class="advice-panel">
            <div style="font-weight:600; font-size:14px; margin-bottom:5px;">💡 คำแนะนำเบื้องต้น:</div>
            <div id="advice-text" style="font-size:12.5px; line-height:1.5; color:#444;"></div>
        </div>

        <div id="shop-area" class="shop-area">
            <div style="font-weight:600; font-size:13px; margin-bottom:10px;">📦 สินค้าแนะนำสำหรับการรักษา:</div>
            <div id="product-info" style="font-size:13px; margin-bottom:10px; background:#f9f9f9; padding:10px; border-radius:8px;"></div>
            <a id="buy-link" href="#" class="action-btn" style="background:var(--line-shop); color:white;">🛒 สั่งซื้อสินค้าทาง LINE Shop</a>
            <a id="chat-link" href="#" class="action-btn" style="background:var(--line-chat); color:white;">💬 ปรึกษาแอดมินเพิ่มเติม</a>
        </div>

        <button class="action-btn" style="background:#eee; color:#666; margin-top:15px;" onclick="saveIssueLog()">บันทึกประวัติการดูแล</button>
        <button style="width:100%; background:none; border:none; color:#999; margin-top:10px;" onclick="closeModal()">ปิดหน้าต่าง</button>
    </div>
</div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3>ลงทะเบียนพืช</h3>
        <input type="text" id="p-name" style="width:100%; padding:12px; margin-bottom:10px; box-sizing:border-box;" placeholder="ชื่อต้นไม้">
        <button class="action-btn" style="background:var(--phetpaya-green); color:white;" onclick="addPlant()">บันทึก</button>
        <button style="width:100%; background:none; border:none; margin-top:10px; color:#999;" onclick="document.getElementById('add-modal').style.display='none'">ยกเลิก</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active">🌳 สวนของฉัน</div>
    <div class="nav-item">🌦️ พยากรณ์โรค</div>
    <div class="nav-item">📑 รายงาน</div>
</div>

<script>
    let plants = JSON.parse(localStorage.getItem('phetpaya_final_db') || "[]");
    let currentPlantId = null;

    const database = {
        pest: {
            advice: "1. ฉีดล้างใบด้วยน้ำเปล่า\n2. ลดปุ๋ยที่มีไนโตรเจนสูง\n3. ใช้สารสกัดสะเดาหรือสารกำจัดแมลงกลุ่มที่ 4",
            product: "Phetpaya PestKill (290.-)",
            link: "https://shop.line.me/@phetpaya/product/1"
        },
        fungi: {
            advice: "1. ตัดแต่งส่วนที่เป็นโรคออก\n2. งดรดน้ำช่วงเย็น\n3. ใช้ไตรโคเดอร์มาผสมน้ำราดโคนต้น",
            product: "ชุดกำจัดเชื้อราเพชรพญา (350.-)",
            link: "https://shop.line.me/@phetpaya/product/2"
        },
        yellow: {
            advice: "1. ตรวจสอบความร่วนซุยของดิน\n2. เสริมธาตุอาหารรองทางใบ\n3. ปรับค่า pH ดินให้อยู่ที่ 5.5-6.5",
            product: "Phetpaya Plus ธาตุอาหารรวม (320.-)",
            link: "https://shop.line.me/@phetpaya/product/3"
        }
    };

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("welcome").innerText = "ผู้ดูแล: คุณ " + profile.displayName;
            } else { liff.login(); }
        } catch (e) {}
        render();
    }

    function render() {
        const list = document.getElementById('plantList');
        list.innerHTML = plants.map(p => `
            <div class="plant-card">
                <div style="font-weight:600; color:var(--phetpaya-green); font-size:16px;">${p.name}</div>
                <div style="font-size:12px; color:#888; margin-top:4px;">
                    รดน้ำล่าสุด: ${p.lastWater} | ใส่ปุ๋ยล่าสุด: ${p.lastFert}
                </div>
                ${p.lastIssue ? `<div class="history-tag">⚠️ พบล่าสุด: ${p.lastIssue}</div>` : ''}
                
                <div class="log-btn-group">
                    <div class="log-btn" onclick="quickLog(${p.id}, 'water')">💧<br>รดน้ำ</div>
                    <div class="log-btn" onclick="quickLog(${p.id}, 'fert')">🧪<br>ใส่ปุ๋ย</div>
                    <div class="log-btn" style="color:var(--status-danger)" onclick="openIssueModal(${p.id}, '${p.name}')">🚨<br>แจ้งปัญหา</div>
                </div>
            </div>
        `).join('');
    }

    function addPlant() {
        const name = document.getElementById('p-name').value;
        if(!name) return;
        plants.push({ id: Date.now(), name: name, lastWater: '-', lastFert: '-', lastIssue: '' });
        localStorage.setItem('phetpaya_final_db', JSON.stringify(plants));
        document.getElementById('add-modal').style.display='none';
        render();
    }

    function quickLog(id, type) {
        const now = new Date().toLocaleDateString('th-TH');
        plants = plants.map(p => {
            if(p.id === id) {
                if(type === 'water') p.lastWater = now;
                else p.lastFert = now;
            }
            return p;
        });
        localStorage.setItem('phetpaya_final_db', JSON.stringify(plants));
        render();
    }

    function openIssueModal(id, name) {
        currentPlantId = id;
        document.getElementById('target-plant-name').innerText = "แจ้งปัญหา: " + name;
        document.getElementById('issue-select').value = "";
        document.getElementById('advice-panel').style.display = "none";
        document.getElementById('shop-area').style.display = "none";
        document.getElementById('issue-modal').style.display = "flex";
    }

    function getExpertAdvice() {
        const type = document.getElementById('issue-select').value;
        if(!type) return;
        const data = database[type];
        document.getElementById('advice-text').innerText = data.advice;
        document.getElementById('product-info').innerText = "แนะนำ: " + data.product;
        document.getElementById('buy-link').href = data.link;
        document.getElementById('chat-link').href = `https://line.me/R/oaMessage/@phetpaya/?สอบถามเรื่อง${type}`;
        
        document.getElementById('advice-panel').style.display = "block";
        document.getElementById('shop-area').style.display = "block";
    }

    function saveIssueLog() {
        const select = document.getElementById('issue-select');
        const issueName = select.options[select.selectedIndex].text;
        if(!select.value) return alert("กรุณาเลือกอาการก่อนบันทึกครับ");
        
        plants = plants.map(p => {
            if(p.id === currentPlantId) p.lastIssue = issueName + " (" + new Date().toLocaleDateString('th-TH') + ")";
            return p;
        });
        localStorage.setItem('phetpaya_final_db', JSON.stringify(plants));
        closeModal();
        render();
    }

    function closeModal() { document.getElementById('issue-modal').style.display = "none"; }

    init();
</script>
</body>
</html>
