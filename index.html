<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden Pro</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya: #2D5A27; --accent: #5E8D5A; --bg: #F8FAF8; --white: #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; color: #333; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Header & Dashboard */
        .hero { background: linear-gradient(135deg, #2D5A27, #5E8D5A); color: white; border-radius: 0 0 40px 40px; padding: 40px 25px 60px; box-shadow: 0 10px 30px rgba(45,90,39,0.2); }
        .card { background: var(--white); border-radius: 25px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-top: -30px; border: 1px solid #f0f0f0; }
        
        /* Premium Features */
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .f-item { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .f-item:active { transform: scale(0.95); background: #f0f7f0; }
        .f-icon { font-size: 30px; margin-bottom: 10px; display: block; }
        
        /* Plant Guide Card */
        .guide-box { display: none; background: white; border-radius: 30px; overflow: hidden; margin-top: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .care-pill-box { display: flex; overflow-x: auto; gap: 10px; padding: 15px 20px; scrollbar-width: none; }
        .care-pill { background: #f0f7f0; padding: 10px 20px; border-radius: 15px; font-size: 13px; color: var(--phetpaya); white-space: nowrap; border: 1px solid #e0eadd; }

        .btn-buy { background: #FF9F43; color: white; border: none; padding: 15px; border-radius: 18px; width: 100%; font-weight: 600; margin-top: 15px; cursor: pointer; }
        
        .nav-tab { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 15px 0 35px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .nav-item { flex: 1; text-align: center; color: #BDC3C7; font-size: 11px; }
        .nav-item.active { color: var(--phetpaya); }
    </style>
</head>
<body>

<div class="hero">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <div style="font-size: 14px; opacity: 0.9;">ยินดีต้อนรับสู่</div>
            <div style="font-size: 24px; font-weight: 600;">PHETPAYA GARDEN</div>
        </div>
        <div id="weather-box" style="text-align: right;">
            <b id="temp-val" style="font-size: 28px;">--°C</b><br>
            <span id="loc-text" style="font-size: 11px; opacity: 0.8;">📍 ระบุตำแหน่ง...</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="background: #f0f7f0; padding: 10px; border-radius: 15px; font-size: 24px;">🌿</div>
            <div style="text-align: left;">
                <b style="color:var(--phetpaya);">ผู้ช่วยดูแลต้นไม้อัจฉริยะ</b>
                <p style="margin:0; font-size: 12px; color: #888;">ถ่ายรูปหรือค้นหา เพื่อรับวิธีดูแลระดับมืออาชีพ</p>
            </div>
        </div>
    </div>

    <div class="feature-grid">
        <div class="f-item" onclick="scanAI()">
            <span class="f-icon">🏥</span>
            <b>AI คลินิก</b>
            <div style="font-size: 10px; color: #999;">วินิจฉัยโรคพืช</div>
        </div>
        <div class="f-item" onclick="searchDB()">
            <span class="f-icon">📚</span>
            <b>คู่มือการดูแล</b>
            <div style="font-size: 10px; color: #999;">จากฐานข้อมูลร้าน</div>
        </div>
    </div>

    <div id="status-msg" style="text-align:center; margin-top:15px; font-size:13px; color:var(--accent);"></div>

    <div id="guide-display" class="guide-box">
        <div style="background: var(--phetpaya); color: white; padding: 30px 20px;">
            <div style="font-size: 11px; text-transform: uppercase; opacity: 0.8;">Plant Information</div>
            <h2 id="p-name" style="margin:5px 0; font-size: 24px;"></h2>
            <div style="margin-top:10px; font-size: 12px; background: rgba(255,255,255,0.2); display: inline-block; padding: 5px 15px; border-radius: 10px;">
                คะแนนสุขภาพ: <span id="p-health">--</span>%
            </div>
        </div>
        
        <div class="care-pill-box">
            <div class="care-pill">💧 <span id="p-water"></span></div>
            <div class="care-pill">☀️ <span id="p-light"></span></div>
            <div class="care-pill">🌱 <span id="p-fert"></span></div>
        </div>

        <div style="padding: 25px; pt: 0;">
            <p style="font-size: 12px; font-weight: 600; color: #999; margin: 0 0 10px;">วิธีดูแลจาก Phetpaya Garden</p>
            <div id="p-note" style="font-size: 14px; line-height: 1.8; color: #444; background: #f9fbf9; padding: 20px; border-radius: 20px;"></div>
            
            <button class="btn-buy" onclick="window.open('https://line.me/ti/p/@yourline')">🛒 ปรึกษาผู้เชี่ยวชาญ / สั่งปุ๋ย</button>
        </div>
    </div>
</div>

<div class="nav-tab">
    <div class="nav-item active">🏡<br>หน้าหลัก</div>
    <div class="nav-item" onclick="alert('ระบบสมาชิกกำลังเปิดตัวเร็วๆ นี้!')">⭐️<br>สะสมแต้ม</div>
    <div class="nav-item" onclick="window.location.reload()">🔄<br>รีเฟรช</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdbNHpErNo49-qPOBb7Q8fM2b3tiPbcDSNH_6QcysM3-rEKCeG_-4KWBjqOTLqzW2xCQ/exec";

    function updateGPS() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=f1311f97b48347f3b60c0f8364843477&units=metric&lang=th`);
                const data = await res.json();
                document.getElementById('loc-text').innerText = "📍 " + data.name;
                document.getElementById('temp-val').innerText = Math.round(data.main.temp) + "°C";
            } catch(e) {}
        });
    }

    async function searchDB() {
        const name = prompt("ระบุชื่อต้นไม้ที่ต้องการค้นหา:");
        if(!name) return;
        const status = document.getElementById('status-msg');
        const guide = document.getElementById('guide-display');
        status.innerText = "⏳ กำลังดึงข้อมูลจากสวน...";
        guide.style.display = "none";

        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'searchDB', plantName: name }) });
        const data = await res.json();
        
        if(data.status === "success") {
            document.getElementById('p-name').innerText = data.name;
            document.getElementById('p-water').innerText = data.water;
            document.getElementById('p-light').innerText = data.light;
            document.getElementById('p-fert').innerText = data.fertilizer;
            document.getElementById('p-note').innerText = data.note;
            document.getElementById('p-health').innerText = data.health;
            status.innerText = "";
            guide.style.display = "block";
            window.scrollTo({ top: 500, behavior: 'smooth' });
        } else {
            status.innerText = "❌ ไม่พบพืชชื่อนี้ในฐานข้อมูล";
        }
    }

    function scanAI() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
        input.onchange = async (e) => {
            const status = document.getElementById('status-msg');
            status.innerText = "⏳ AI กำลังตรวจสุขภาพพืชให้คุณ...";
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = (img.height/img.width)*400;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ image: base64 }) });
                    const text = await res.text();
                    status.innerHTML = `<div style="text-align:left; background:white; padding:25px; border-radius:25px; border:1px solid #e0eadd; margin-top:20px; line-height:1.8;"><b>🚑 ผลการวินิจฉัยจาก AI:</b><br>${text.replace(/\n/g, '<br>')}</div>`;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    updateGPS();
</script>
</body>
</html>
