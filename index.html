<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden - Ultimate Care</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya: #2D5A27; --phetpaya-light: #E8F5E9; --danger: #FF5252; --google: #4285F4; --line-shop: #00B900; --bg: #F8FAF8; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 90px; color: #2C3E50; }
        
        .app-header { background: #fff; padding: 20px; border-bottom: 1px solid #edf2ed; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 16px; max-width: 500px; margin: auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* Weather Hero */
        .weather-hero { background: linear-gradient(135deg, #388E3C, var(--phetpaya)); color: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(45,90,39,0.2); }
        
        /* Plant Card */
        .plant-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #f0f4f0; position: relative; overflow: hidden; }
        .plant-img-preview { width: 100%; height: 150px; background: #eee; border-radius: 16px; object-fit: cover; margin-bottom: 12px; }
        .badge { font-size: 11px; padding: 6px 12px; border-radius: 20px; font-weight: 600; display: inline-block; margin-right: 5px; }
        .bg-overdue { background: #FFEBEE; color: var(--danger); }
        .bg-ok { background: #E8F5E9; color: var(--phetpaya); }

        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn-circle { border: 1px solid #eee; background: #fff; padding: 12px 5px; border-radius: 16px; font-size: 11px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-primary { background: var(--phetpaya); color: white; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 600; font-size: 16px; cursor: pointer; }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #edf2ed; padding: 10px 0 25px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #BDC3C7; cursor: pointer; }
        .nav-item.active { color: var(--phetpaya); }

        /* Modals */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; padding:20px; box-sizing: border-box; }
        .modal-content { background:white; padding:25px; border-radius:28px; width:100%; max-width: 400px; box-sizing: border-box; }
        .input-std { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #E0E0E0; margin-top: 10px; font-size: 16px; box-sizing: border-box; }
        
        #light-canvas { display: none; }
    </style>
</head>
<body>

<div class="app-header">
    <h1 style="margin:0; font-size:18px; color:var(--phetpaya)">Phetpaya Garden</h1>
    <div id="user-name" style="font-size:12px; color:#999;">กำลังโหลด...</div>
</div>

<div class="container">
    
    <div id="page-home" class="page-content active">
        <div class="weather-hero">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div id="weather-info">ดึงข้อมูลอากาศ...</div>
                <div style="font-size:32px;">⛅</div>
            </div>
            <div id="daily-alert" style="font-size:12px; margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.2);">
                กำลังวิเคราะห์สภาพอากาศเพื่อวางแผนการดูแล...
            </div>
        </div>
        <button class="btn-primary" onclick="openModal('add-modal')">＋ ลงทะเบียนพืชใหม่ (พร้อมรูปถ่าย)</button>
        <div id="plantList" style="margin-top:20px;"></div>
    </div>

    <div id="page-tools" class="page-content">
        <h3>🔍 เครื่องมืออัจฉริยะ</h3>
        <div class="plant-card" style="text-align:center; border:2px dashed var(--google);">
            <div style="font-weight:600; color:var(--google); margin-bottom:10px;">Plant ID & Diagnosis</div>
            <button class="btn-primary" style="background:var(--google);" onclick="handleLens()">เปิดกล้องสแกนวินิจฉัยโรค</button>
        </div>

        <div class="plant-card" style="text-align:center;">
            <div style="font-weight:600; color:var(--phetpaya);">Lux Meter (วัดความเข้มแสงจริง)</div>
            <div id="lux-display" style="font-size:36px; font-weight:600; color:var(--google); margin:15px 0;">0 LUX</div>
            <button class="btn-primary" style="background:#eee; color:#333;" onclick="measureLight()">เริ่มวัดค่าแสงจากกล้องหน้า</button>
            <canvas id="light-canvas"></canvas>
            <p id="light-advice" style="font-size:12px; color:#666; margin-top:10px;">หันกล้องไปทางจุดที่วางต้นไม้</p>
        </div>
    </div>

    <div id="page-report" class="page-content">
        <h3>📑 รายงานสุขภาพสวน</h3>
        <div id="report-list"></div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">🏡<br>สวนของฉัน</div>
    <div class="nav-item" onclick="switchTab('tools', this)">🔍<br>เครื่องมือ</div>
    <div class="nav-item" onclick="switchTab('report', this)">📑<br>รายงาน</div>
</div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3>🌱 เพิ่มต้นไม้ใหม่</h3>
        <input type="text" id="p-name" class="input-std" placeholder="ชื่อต้นไม้">
        <label style="font-size:12px; margin-top:10px; display:block;">ถ่ายรูปต้นไม้:</label>
        <input type="file" id="p-image" accept="image/*" capture="environment" class="input-std">
        <button class="btn-primary" style="margin-top:20px;" onclick="savePlant()">บันทึกเข้าสวน</button>
        <button style="width:100%; background:none; border:none; margin-top:15px; color:#999;" onclick="closeModal('add-modal')">ยกเลิก</button>
    </div>
</div>

<script>
    let plants = JSON.parse(localStorage.getItem('phetpaya_v9_ultimate') || "[]");
    const API_KEY = "bd5e378503939dec125e1c0384814e5b"; // OpenWeather (Example Key)

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("user-name").innerText = profile.displayName;
                getWeather();
            } else { liff.login(); }
        } catch (e) {}
        render();
    }

    // ระบบอากาศจริงตามพิกัด
    function getWeather() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=th`);
                const data = await res.json();
                document.getElementById('weather-info').innerHTML = `<b>${data.name}</b>: ${data.main.temp}°C ${data.weather[0].description}`;
                analyzeCare(data.main.temp, data.main.humidity);
            } catch(e) { document.getElementById('weather-info').innerText = "ดึงข้อมูลอากาศผิดพลาด"; }
        });
    }

    function analyzeCare(temp, hum) {
        let advice = "☀️ อากาศปกติ ดูแลตามตารางที่ระบบกำหนด";
        if(temp > 35) advice = "🔥 อากาศร้อนจัด! ควรพรมน้ำที่ใบและเพิ่มความถี่รดน้ำ";
        if(hum > 80) advice = "🌧️ ความชื้นสูง! ระวังโรครากเน่า งดการรดน้ำหากดินยังแฉะ";
        document.getElementById('daily-alert').innerText = advice;
    }

    // ระบบวัดแสงจากกล้องจริง
    async function measureLight() {
        const video = document.createElement('video');
        const canvas = document.getElementById('light-canvas');
        const ctx = canvas.getContext('2d');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.play();
            
            setTimeout(() => {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let brightness = 0;
                for (let i = 0; i < data.length; i += 4) {
                    brightness += (data[i] + data[i+1] + data[i+2]) / 3;
                }
                const lux = Math.round((brightness / (data.length / 4)) * 10); // แปลงเป็นค่า Lux โดยประมาณ
                document.getElementById('lux-display').innerText = lux + " LUX";
                
                let advice = lux < 500 ? "🌚 แสงน้อย: เหมาะกับไม้ร่ม" : (lux < 2000 ? "⛅ แสงรำไร: เหมาะกับไม้ใบ" : "☀️ แสงจัด: เหมาะกับกระบองเพชร");
                document.getElementById('light-advice').innerText = advice;
                
                stream.getTracks().forEach(track => track.stop());
            }, 1000);
        } catch(e) { alert("กรุณาอนุญาตการเข้าถึงกล้องเพื่อวัดแสง"); }
    }

    function savePlant() {
        const name = document.getElementById('p-name').value;
        const fileInput = document.getElementById('p-image');
        if(!name) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const newPlant = {
                id: Date.now(),
                name: name,
                img: e.target.result || "",
                lastWater: Date.now(),
                lastFert: Date.now(),
                logs: []
            };
            plants.push(newPlant);
            localStorage.setItem('phetpaya_v9_ultimate', JSON.stringify(plants));
            closeModal('add-modal');
            render();
        };
        if(fileInput.files[0]) reader.readAsDataURL(fileInput.files[0]);
        else reader.onload({ target: { result: "" } });
    }

    function render() {
        const list = document.getElementById('plantList');
        const report = document.getElementById('report-list');
        const now = Date.now();
        
        list.innerHTML = plants.map(p => {
            const wDiff = Math.floor((now - p.lastWater) / 86400000);
            const fDiff = Math.floor((now - p.lastFert) / 86400000);
            
            return `
                <div class="plant-card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" class="plant-img-preview">
                    <div style="font-weight:600; font-size:18px;">${p.name}</div>
                    <div style="margin:10px 0;">
                        <span class="badge ${wDiff >= 3 ? 'bg-overdue' : 'bg-ok'}">💧 ${wDiff >= 3 ? 'เกินกำหนด' : 'อีก ' + (3-wDiff) + ' วัน'}</span>
                        <span class="badge ${fDiff >= 15 ? 'bg-overdue' : 'bg-ok'}">🧪 ${fDiff >= 15 ? 'เกินกำหนด' : 'อีก ' + (15-fDiff) + ' วัน'}</span>
                    </div>
                    <div class="btn-grid">
                        <div class="btn-circle" onclick="updateCare(${p.id}, 'water')"><span>💧</span>รดน้ำ</div>
                        <div class="btn-circle" onclick="updateCare(${p.id}, 'fert')"><span>🧪</span>ใส่ปุ๋ย</div>
                        <div class="btn-circle" style="color:var(--danger)" onclick="handleLens()"><span>🚨</span>วินิจฉัย</div>
                    </div>
                </div>
            `;
        }).join('');

        // หน้ารายงาน
        const allLogs = plants.flatMap(p => p.logs.map(l => ({ name: p.name, ...l })));
        report.innerHTML = allLogs.length ? allLogs.map(l => `<div class="plant-card"><b>${l.name}</b>: ${l.text} (${l.date})</div>`).join('') : "<p style='text-align:center; color:#999;'>ยังไม่มีประวัติสุขภาพ</p>";
    }

    function updateCare(id, type) {
        plants = plants.map(p => {
            if(p.id === id) {
                if(type === 'water') p.lastWater = Date.now();
                else p.lastFert = Date.now();
            }
            return p;
        });
        localStorage.setItem('phetpaya_v9_ultimate', JSON.stringify(plants));
        render();
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function handleLens() {
        window.location.href = "googleapp://lens";
        setTimeout(() => { if (document.hasFocus()) window.open("https://www.google.com/searchbyimage?sbisrc=4se", '_blank'); }, 1000);
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    init();
</script>
</body>
</html>
