<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phetpaya Garden - Professional Care</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --phetpaya-green: #1B5E20; --light-bg: #F5F7F5; --status-ok: #43A047; --status-warn: #FB8C00; --status-danger: #E53935; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--light-bg); margin: 0; color: #333; padding-bottom: 80px; }
        .app-header { background: #fff; padding: 20px; text-align: left; border-bottom: 1px solid #eee; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Weather Card */
        .weather-card { background: linear-gradient(135deg, #2E7D32, #1B5E20); color: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .weather-info { display: flex; justify-content: space-between; align-items: center; }
        
        /* Plant Card */
        .plant-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        .plant-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f5f5f5; padding-bottom: 10px; margin-bottom: 10px; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; color: white; }
        
        /* Expert Advice */
        .advice-box { background: #FFF8E1; border-left: 4px solid #FFB300; padding: 10px; font-size: 13px; margin: 10px 0; border-radius: 0 8px 8px 0; }

        /* Form */
        .btn-main { background: var(--phetpaya-green); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; }
        .input-std { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #999; }
        .nav-item.active { color: var(--phetpaya-green); }
    </style>
</head>
<body>

<div class="app-header">
    <h1 style="margin:0; font-size:20px; color:var(--phetpaya-green)">Phetpaya Garden</h1>
    <div id="welcome" style="font-size:12px; color:#777">สวัสดีครับคุณ ...</div>
</div>

<div class="container">
    <div class="weather-card">
        <div style="font-size:12px; opacity:0.8;">วิเคราะห์สภาพอากาศรายพื้นที่</div>
        <div class="weather-info">
            <div id="weather-stat">กำลังดึงข้อมูลพื้นที่...</div>
            <div id="location-name" style="font-size:14px; font-weight:600;">📍 ตรวจสอบตำแหน่ง</div>
        </div>
        <div id="expert-alert" style="margin-top:10px; font-size:13px; border-top:1px solid rgba(255,255,255,0.2); padding-top:8px;">
            ⚠️ ช่วงนี้ความชื้นสูง ระวังโรครากเน่าและเชื้อราในทุเรียน
        </div>
    </div>

    <button class="btn-main" style="margin-bottom:20px;" onclick="document.getElementById('add-modal').style.display='flex'">+ เพิ่มพืชลงทะเบียนใหม่</button>
    
    <div id="plantList"></div>
</div>

<div id="add-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:15px; width:85%;">
        <h3>ลงทะเบียนพืช</h3>
        <input type="text" id="p-name" class="input-std" placeholder="ชื่อเรียกต้นไม้">
        <select id="p-type" class="input-std">
            <option value="ทุเรียน">ทุเรียน</option>
            <option value="ข้าว">ข้าว</option>
            <option value="พืชสวน">พืชสวน/ไม้ใบ</option>
        </select>
        <button class="btn-main" onclick="addPlant()">ลงทะเบียน</button>
        <button style="width:100%; background:none; border:none; margin-top:10px; color:#999;" onclick="document.getElementById('add-modal').style.display='none'">ยกเลิก</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active">📋 รายการพืช</div>
    <div class="nav-item">🌦️ พยากรณ์โรค</div>
    <div class="nav-item">📑 รายงาน</div>
</div>

<script>
    let plants = JSON.parse(localStorage.getItem('phetpaya_db') || "[]");

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("welcome").innerText = "ผู้ดูแลระบบ: คุณ " + profile.displayName;
                getWeather(); // ดึงสภาพอากาศ
            } else { liff.login(); }
        } catch (e) { console.log(e); }
        renderPlants();
    }

    function getWeather() {
        // จำลองการดึงสภาพอากาศตามฤดูกาลและพื้นที่ (ในอนาคตเชื่อม API Weather)
        const month = new Date().getMonth() + 1;
        let advice = "";
        if(month >= 5 && month <= 10) advice = "⛈️ ฤดูฝน: ระวังการระบาดของโรครากเน่าและเชื้อราไฟทอปเธอร่า แนะนำฉีดพ่นสารป้องกันเชื้อรา";
        else if(month >= 11 || month <= 2) advice = "🌡️ ฤดูหนาว: ระวังเพลี้ยไฟและไรแดงทำลายใบอ่อน";
        else advice = "☀️ ฤดูร้อน: ระวังการขาดน้ำและเพลี้ยจักจั่นฝอย";
        
        document.getElementById('expert-alert').innerText = advice;
        document.getElementById('weather-stat').innerText = "อุณหภูมิ 31°C | ความชื้น 75%";
        document.getElementById('location-name').innerText = "📍 เขตสมุทรปราการ";
    }

    function addPlant() {
        const name = document.getElementById('p-name').value;
        const type = document.getElementById('p-type').value;
        if(!name) return;
        plants.push({ id: Date.now(), name: name, type: type, lastWater: 'ยังไม่มีบันทึก', lastFert: 'ยังไม่มีบันทึก' });
        localStorage.setItem('phetpaya_db', JSON.stringify(plants));
        document.getElementById('add-modal').style.display='none';
        renderPlants();
    }

    function renderPlants() {
        const list = document.getElementById('plantList');
        list.innerHTML = plants.map(p => `
            <div class="plant-item">
                <div class="plant-header">
                    <div style="font-weight:600; color:var(--phetpaya-green)">${p.name} (${p.type})</div>
                    <span class="status-badge" style="background:var(--status-ok)">สุขภาพปกติ</span>
                </div>
                <div style="font-size:13px; color:#666;">
                    💧 รดน้ำล่าสุด: ${p.lastWater}<br>
                    🧪 ใส่ปุ๋ยล่าสุด: ${p.lastFert}
                </div>
                <div class="advice-box">
                    <strong>คำแนะนำวันนี้:</strong> ตรวจสอบพิกัดพบความชื้นสะสม ควรเลี่ยงการให้ปุ๋ยทางใบในช่วงเย็น
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd; background:#fff;" onclick="updateLog(${p.id}, 'water')">💧 บันทึกรดน้ำ</button>
                    <button style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd; background:#fff;" onclick="updateLog(${p.id}, 'fert')">🧪 บันทึกปุ๋ย</button>
                </div>
            </div>
        `).join('');
    }

    function updateLog(id, type) {
        const now = new Date().toLocaleDateString('th-TH');
        plants = plants.map(p => {
            if(p.id === id) {
                if(type === 'water') p.lastWater = now;
                else p.lastFert = now;
            }
            return p;
        });
        localStorage.setItem('phetpaya_db', JSON.stringify(plants));
        renderPlants();
    }

    init();
</script>
</body>
</html>
