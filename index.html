<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพชรพญา - คำนวณการใช้ปุ๋ย</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary-color: #2e7d32; --secondary-color: #f1f8e9; }
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f0; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; color: var(--primary-color); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #resultArea { margin-top: 20px; display: none; padding: 15px; background-color: var(--secondary-color); border-left: 5px solid var(--primary-color); border-radius: 8px; }
        .product-img { width: 100px; height: auto; display: block; margin: 10px auto; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>เครื่องมือคำนวณปุ๋ยเพชรพญา</h2>
        <p>ยินดีต้อนรับคุณ <span id="userName" style="font-weight: bold;">...</span></p>
    </div>

    <div class="input-group">
        <label>ประเภทพืชที่ปลูก</label>
        <select id="plantType">
            <option value="durian">ทุเรียน (บำรุงต้น/ฟื้นฟู)</option>
            <option value="rice">ข้าว (เร่งราก/แตกกอ)</option>
            <option value="fruit">ไม้ผลอื่นๆ</option>
        </select>
    </div>

    <div class="input-group">
        <label>จำนวนพื้นที่ (ไร่)</label>
        <input type="number" id="areaSize" placeholder="ใส่จำนวนไร่" min="1">
    </div>

    <button class="btn" onclick="calculate()">คำนวณจำนวนที่ต้องใช้</button>

    <div id="resultArea">
        <div id="recommendationText"></div>
        <p style="font-size: 0.9em; color: #666; margin-top: 10px;">*เป็นการคำนวณเบื้องต้น ควรปรับตามสภาพดิน</p>
    </div>
</div>

<script>
    // 1. เชื่อมต่อกับ LINE
    async function initLiff() {
        try {
            await liff.init({ liffId: "2009595288" }); // ต้องเปลี่ยนเป็น ID ของคุณ
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById("userName").innerText = profile.displayName;
            }
        } catch (err) {
            console.error("LIFF Error", err);
        }
    }

    // 2. ฟังก์ชันคำนวณ
    function calculate() {
        const type = document.getElementById('plantType').value;
        const area = document.getElementById('areaSize').value;
        const resultDiv = document.getElementById('resultArea');
        const textDiv = document.getElementById('recommendationText');

        if (!area || area <= 0) {
            alert("กรุณาระบุจำนวนไร่ครับ");
            return;
        }

        let bags = 0;
        let product = "";

        if (type === 'durian') {
            bags = area * 1.5; // ตัวอย่าง: ทุเรียนใช้ 1.5 กระสอบ/ไร่
            product = "เพชรพญา สูตรฟื้นฟูต้น";
        } else if (type === 'rice') {
            bags = area * 1; 
            product = "เพชรพญา สูตรเร่งราก";
        } else {
            bags = area * 1.2;
            product = "เพชรพญา สูตรบำรุงทั่วไป";
        }

        textDiv.innerHTML = `
            <p>แนะนำให้ใช้: <strong>${product}</strong></p>
            <p>จำนวนที่ต้องใช้ประมาณ: <span style="font-size: 24px; color: #2e7d32;">${bags.toFixed(1)}</span> กระสอบ</p>
        `;
        resultDiv.style.display = 'block';
    }

    initLiff();
</script>

</body>
</html>
