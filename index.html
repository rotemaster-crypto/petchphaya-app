<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phetpaya Garden - AI Premium V3</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --phetpaya: #2D5A27; 
            --accent: #5E8D5A;
            --bg: #F0F4F0; 
            --card-bg: #FFFFFF;
            --google: #4285F4;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            color: #2C3E50;
            padding-bottom: 120px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .app-header { 
            background: #fff; padding: 20px; 
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Weather Card */
        .weather-hero { 
            background: linear-gradient(135deg, #2D5A27, #5E8D5A); 
            color: white; border-radius: 28px; padding: 25px; 
            margin-bottom: 25px; position: relative;
            box-shadow: 0 10px 20px rgba(45,90,39,0.2);
        }
        .btn-gps { 
            background: rgba(255,255,255,0.2); border: 1px solid white; 
            color: white; padding: 6px 15px; border-radius: 20px; 
            font-size: 12px; cursor: pointer; margin-top: 15px;
        }

        /* Plant Grid */
        .plant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .plant-card { 
            background: var(--card-bg); border-radius: 25px; 
            padding: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            text-align: center; position: relative;
        }
        .plant-img { width: 100%; height: 130px; border-radius: 20px; object-fit: cover; margin-bottom: 8px; background: #eee; }

        /* Buttons */
        .btn-main { 
            background: var(--phetpaya); color: white; border: none; 
            padding: 18px; border-radius: 22px; width: 100%; 
            font-weight: 600; font-size: 16px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 5px 15px rgba(45,90,39,0.3);
        }
        .btn-main:disabled { background: #ccc; box-shadow: none; }

        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; padding: 15px 0 35px 0; 
            border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        .nav-item { flex: 1; text-align: center; color: #BDC3C7; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--phetpaya); }

        /* AI Result Box */
        .ai-result-box {
            text-align: left; background: #e8f5e9; padding: 15px; 
            border-radius: 15px; border-left: 5px solid var(--phetpaya); 
            margin-top: 15px; font-size: 14px; line-height: 1.6;
        }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:white; padding:25px; border-radius:30px; width:100%; max-width: 400px; }
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #eee; margin-top: 10px; box-sizing: border-box; font-family: 'Kanit'; }

        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:600; color:var(--phetpaya); font-size:20px;">Phetpaya Garden Pro</div>
    <div id="user-display" style="font-size:12px; color:#999;">คุณ ตั้ม เองแหละ</div>
</div>

<div class="container">
    <div id="page-home" class="page-content active">
        <div class="weather-hero">
            <div id="loc-text">📍 รอยืนยันตำแหน่ง...</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div>
                    <div id="temp-display" style="font-size: 45px; font-weight: 600; line-height: 1;">--°C</div>
                    <div id="weather-desc" style="font-size: 14px; opacity: 0.9;">กรุณากดปุ่มเปิด GPS</div>
                </div>
                <div style="font-size: 55px;">🌤️</div>
            </div>
            <button class="btn-gps" onclick="updateWeather()">🔄 เปิด GPS / อัปเดตอากาศ</button>
        </div>

        <button class="btn-main" onclick="openModal('add-modal')">+ ลงทะเบียนต้นไม้ใหม่</button>

        <h3 style="margin: 30px 0 15px 5px; font-weight: 600;">ต้นไม้ในสวน</h3>
        <div id="plantList" class="plant-grid"></div>
    </div>

    <div id="page-tools" class="page-content">
        <h3 style="margin-bottom: 20px;">🔍 เครื่องมืออัจฉริยะ</h3>
        
        <div class="plant-card" style="margin-bottom: 20px; padding: 25px;">
            <div style="font-size: 45px;">🏥</div>
            <div style="font-weight: 600; font-size: 18px; color: var(--phetpaya); margin-top: 10px;">AI วินิจฉัยโรคพืช</div>
            <p style="font-size: 12px; color: #777; margin-bottom: 15px;">ถ่ายรูปใบไม้เพื่อส่งให้ Gemini วิเคราะห์ (ภาษาไทย)</p>
            
            <div id="ai-status" style="font-size: 13px; color: var(--phetpaya); margin-bottom: 10px;"></div>
            <div id="ai-output"></div>
            
            <button class="btn-main" id="btn-ai" onclick="startAIDiagnosis()">📷 ถ่ายรูปสแกนโรค</button>
        </div>

        <div class="plant-card" style="padding: 25px;">
            <div style="font-size: 45px;">💡</div>
            <div style="font-weight: 600; font-size: 18px; margin-top: 10px;">Smart Lux Meter</div>
            <div id="lux-val" style="font-size: 50px; font-weight: 700; color: var(--google); margin: 15px 0;">0</div>
            <div id="lux-advice" style="font-size: 14px; color: var(--accent); margin-bottom: 20px; font-weight: 600;">- รอกดวัดแสง -</div>
            <button class="btn-main" style="background:#f0f0f0; color:#333;" onclick="startLuxMeter()">เริ่มวัดแสง</button>
            <video id="lux-preview" autoplay playsinline style="display:none;"></video>
            <canvas id="c-buffer" style="display:none;"></canvas>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">🏡<br>หน้าหลัก</div>
    <div class="nav-item" onclick="switchTab('tools', this)">🔍<br>เครื่องมือ</div>
</div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">🌿 เพิ่มต้นไม้</h3>
        <input type="text" id="p-name" class="input-box" placeholder="ระบุชื่อต้นไม้">
        <input type="file" id="p-img" class="input-box" accept="image/*" capture="environment" onchange="handleImage(this)">
        <div id="status" style="font-size:11px; color:green; margin-top:8px; display:none;"></div>
        <button id="save-btn" class="btn-main" style="margin-top:20px;" onclick="saveToCloud()" disabled>กรุณาถ่ายรูปพืช</button>
        <button style="width:100%; border:none; background:none; margin-top:15px; color:#999;" onclick="closeModal('add-modal')">ยกเลิก</button>
    </div>
</div>

<script>
    // *** สำคัญ: นำ URL ที่ได้จากการ Deploy Apps Script (Anyone) มาวางตรงนี้ ***
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHtDLDUA67ZQqN623jp9R8wAs0uqXMAd3-QTjije5sBTQbexhII1bN9wIi9rIk5ZSG6Q/exec";

    let plants = JSON.parse(localStorage.getItem('phetpaya_v22_db') || "[]");
    let curLoc = "ระบุตำแหน่งไม่ได้", curTemp = 32, processedImg = "";

    async function init() {
        try {
            await liff.init({ liffId: "2009595288-7Tm3Mher" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-display').innerText = "คุณ " + profile.displayName;
            } else { liff.login(); }
        } catch (e) {}
        renderUI();
    }

    // ฟังก์ชันสภาพอากาศ (แก้ปัญหา GPS)
    function updateWeather() {
        const locText = document.getElementById('loc-text');
        locText.innerText = "⏳ กำลังค้นหาตำแหน่ง...";
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=f1311f97b48347f3b60c0f8364843477&units=metric&lang=th`);
                const data = await res.json();
                curLoc = data.name || "พื้นที่ใกล้เคียง";
                curTemp = Math.round(data.main.temp);
                document.getElementById('loc-text').innerText = "📍 " + curLoc;
                document.getElementById('temp-display').innerText = curTemp + "°C";
                document.getElementById('weather-desc').innerText = data.weather[0].description;
            } catch(e) { 
                document.getElementById('weather-desc').innerText = "โหลดข้อมูลล้มเหลว";
            }
        }, (err) => {
            alert("กรุณาอนุญาตสิทธิ์การเข้าถึงตำแหน่ง (GPS)");
            locText.innerText = "📍 โปรดเปิด GPS ในการตั้งค่า";
        }, { enableHighAccuracy: true });
    }

    function handleImage(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 400; canvas.height = (img.height / img.width) * 400;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                processedImg = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('status').innerText = "✅ รูปภาพพร้อมบันทึก";
                document.getElementById('status').style.display = "block";
                document.getElementById('save-btn').disabled = false;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function saveToCloud() {
        const name = document.getElementById('p-name').value;
        const btn = document.getElementById('save-btn');
        btn.innerText = "⏳ กำลังบันทึก..."; btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, image: processedImg, weather: curLoc }) });
            
            const newPlant = { id: Date.now(), name, img: processedImg };
            plants.unshift(newPlant);
            if(plants.length > 6) plants.pop();
            
            localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
            closeModal('add-modal');
            renderUI();
            alert("บันทึกข้อมูลเรียบร้อย!");
        } catch (e) { alert("Error: " + e.message); }
        btn.innerText = "ลงทะเบียนต้นไม้"; btn.disabled = false;
    }

    // ฟังก์ชัน AI สแกนโรค (แก้ปัญหาการแสดงผล)
    async function startAIDiagnosis() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
        const status = document.getElementById('ai-status');
        const output = document.getElementById('ai-output');
        const btn = document.getElementById('btn-ai');

        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            status.innerHTML = "⏳ <b>กำลังส่งภาพวิเคราะห์...</b><br>โปรดรอประมาณ 10 วินาที";
            output.innerHTML = ""; btn.disabled = true;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 500; canvas.height = (img.height / img.width) * 500;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);

                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'diagnose', image: base64, weather: curLoc })
                        });
                        
                        // อ่านค่าเป็น Text (เพื่อเลี่ยงปัญหา CORS JSON)
                        const aiText = await response.text();
                        
                        status.innerHTML = "✅ วิเคราะห์เสร็จสิ้น";
                        output.innerHTML = `<div class="ai-result-box"><b>🌿 ผลการวิเคราะห์ AI:</b><br>${aiText.replace(/\n/g, "<br>")}</div>`;
                    } catch (err) {
                        status.innerHTML = "✅ บันทึกลง Sheet แล้ว (ตรวจสอบผลใน Google Sheet)";
                        console.log(err);
                    } finally { btn.disabled = false; }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function renderUI() {
        const list = document.getElementById('plantList');
        list.innerHTML = plants.map(p => `
            <div class="plant-card">
                <img src="${p.img}" class="plant-img">
                <div style="font-weight:600; font-size:14px; color:var(--phetpaya);">${p.name}</div>
                <div style="font-size:10px; color:#AAA; margin-top:4px;">สถานะ: แข็งแรง</div>
                <button onclick="deletePlant(${p.id})" style="position:absolute; top:5px; right:5px; background:none; border:none; color:#EEE; font-size:12px;">🗑️</button>
            </div>
        `).join('') || `<div style="grid-column: 1/3; text-align:center; padding: 40px; color:#BDC3C7;">ยังไม่มีต้นไม้ในสวน...</div>`;
    }

    function deletePlant(id) {
        if(confirm('ลบรายการนี้ใช่ไหม?')) {
            plants = plants.filter(p => p.id !== id);
            localStorage.setItem('phetpaya_v22_db', JSON.stringify(plants));
            renderUI();
        }
    }

    // ฟังก์ชันวัดแสง (เพิ่มระบบวิเคราะห์)
    async function startLuxMeter() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            const video = document.getElementById('lux-preview');
            const advice = document.getElementById('lux-advice');
            video.srcObject = stream;
            
            setTimeout(() => {
                const canvas = document.getElementById('c-buffer');
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const pix = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
                let b = 0; for(let i=0; i<pix.length; i+=4) b += (pix[i]+pix[i+1]+pix[i+2])/3;
                const lux = Math.round((b/(pix.length/4))*15);
                
                document.getElementById('lux-val').innerText = lux;
                
                if(lux < 500) advice.innerText = "🌚 แสงน้อย: เหมาะกับพืชในร่ม/เฟิร์น";
                else if(lux < 2500) advice.innerText = "⛅ แสงรำไร: เหมาะกับไม้ใบ/พลูด่าง";
                else advice.innerText = "☀️ แสงจัด: เหมาะกับพืชแดด/พืชสวน";
                
                stream.getTracks().forEach(t => t.stop());
            }, 1500);
        } catch(e) { alert("กรุณาอนุญาตการเข้าถึงกล้องหน้า"); }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }
    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    init();
</script>
</body>
</html>
